version: 2

sources:
  - name: raw
    database: defaultdb
    schema: public
    tables:
      - name: inference_events
        description: Raw LLM inference events from the proxy
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: team
            tests:
              - not_null
          - name: cost_usd
            tests:
              - not_null

      - name: cost_by_team_minute
        description: Windowed aggregations from Spark Streaming
